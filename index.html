<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4A90D9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Budget Manager</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- ... CSS változatlan ... -->
</head>
<body>
    <!-- ... HTML változatlan ... -->

    <script>
        // Javított adatbázis inicializálás
        const db = new Dexie('BudgetManagerDB');
        
        // Verzió kezelés és séma
        db.version(1).stores({
            transactions: '++id, amount, categoryId, date, note, source, currency',
            categories: '++id, name, icon, monthlyLimit, color',
            savingsGoals: '++id, name, targetAmount, currentAmount, deadline, linkedCategoryIds',
            settings: 'key'
        });

        // Alapértelmezett kategóriák
        const defaultCategories = [
            { name: 'Lakhatás', icon: '🏠', monthlyLimit: 150000, color: '#E74C3C' },
            { name: 'Élelmiszer', icon: '🛒', monthlyLimit: 80000, color: '#F39C12' },
            { name: 'Közlekedés', icon: '🚗', monthlyLimit: 30000, color: '#3498DB' },
            { name: 'Szórakozás', icon: '🎮', monthlyLimit: 20000, color: '#9B59B6' },
            { name: 'Megtakarítás', icon: '💰', monthlyLimit: null, color: '#27AE60' },
            { name: 'Bevétel', icon: '💵', monthlyLimit: null, color: '#2ECC71' }
        ];

        let currentCurrency = 'HUF';
        let chart = null;
        let currentPage = 'dashboard';
        let pendingTransaction = null;

        // Pénznem formázás
        function formatCurrency(amount, currency = currentCurrency) {
            try {
                if (currency === 'HUF') {
                    return Math.round(amount).toLocaleString('hu-HU', { maximumFractionDigits: 0 }) + ' Ft';
                } else if (currency === 'EUR') {
                    return '€ ' + amount.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                } else if (currency === 'USD') {
                    return '$' + amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                }
            } catch (e) {
                console.error('Formatting error:', e);
                return amount.toString();
            }
            return amount.toString();
        }

        // Toast értesítés
        function showToast(message) {
            const toast = document.getElementById('toast');
            if (!toast) {
                console.error('Toast element not found');
                alert(message);
                return;
            }
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                if (toast) toast.classList.remove('show');
            }, 2000);
        }

        // Navigáció
        function navigateTo(page) {
            try {
                const pages = document.querySelectorAll('.page');
                pages.forEach(p => p.classList.remove('active'));
                
                const targetPage = document.getElementById(page + '-page');
                if (targetPage) {
                    targetPage.classList.add('active');
                }
                
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                const buttons = document.querySelectorAll('.tab-btn');
                const pageIndex = ['dashboard', 'transactions', 'categories', 'savings', 'ocr', 'settings'].indexOf(page);
                if (buttons[pageIndex]) buttons[pageIndex].classList.add('active');
                
                currentPage = page;
                loadPageContent(page);
            } catch (error) {
                console.error('Navigation error:', error);
            }
        }

        async function loadPageContent(page) {
            try {
                switch(page) {
                    case 'dashboard':
                        await loadDashboard();
                        break;
                    case 'transactions':
                        await loadTransactions();
                        break;
                    case 'categories':
                        await loadCategories();
                        break;
                    case 'savings':
                        await loadSavingsGoals();
                        break;
                    case 'settings':
                        await loadSettings();
                        break;
                }
            } catch (error) {
                console.error(`Error loading ${page}:`, error);
            }
        }

        // Settings
        async function loadSettings() {
            try {
                const setting = await db.settings.get('currency');
                if (setting) {
                    currentCurrency = setting.value;
                    const select = document.getElementById('currency-select');
                    if (select) select.value = currentCurrency;
                }
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        async function changeCurrency() {
            try {
                currentCurrency = document.getElementById('currency-select').value;
                await db.settings.put({ key: 'currency', value: currentCurrency });
                await loadDashboard();
                showToast('Pénznem módosítva');
            } catch (error) {
                console.error('Error changing currency:', error);
                showToast('Hiba a pénznem módosításakor');
            }
        }

        // Tranzakciók CRUD
        async function loadTransactions() {
            try {
                const transactions = await db.transactions.orderBy('date').reverse().toArray();
                const categories = await db.categories.toArray();
                const categoryMap = {};
                categories.forEach(c => categoryMap[c.id] = c);
                
                const list = document.getElementById('transaction-list');
                if (!list) return;
                
                if (transactions.length === 0) {
                    list.innerHTML = '<div class="empty-state"><div class="empty-icon">💳</div><p>Még nincsenek tranzakciók</p></div>';
                    return;
                }
                
                list.innerHTML = transactions.map(t => {
                    const cat = categoryMap[t.categoryId] || { name: 'Ismeretlen', icon: '❓', color: '#95A5A6' };
                    const amount = t.amount || 0;
                    return `
                        <div class="transaction-item">
                            <div class="transaction-info">
                                <span class="category-badge" style="border-left: 3px solid ${cat.color}">
                                    ${cat.icon} ${cat.name}
                                </span>
                                <div class="transaction-meta">${new Date(t.date).toLocaleDateString('hu-HU')} ${t.note ? '- ' + t.note : ''}</div>
                            </div>
                            <div class="transaction-amount ${amount < 0 ? 'expense' : 'income'}">
                                ${amount < 0 ? '-' : '+'}${formatCurrency(Math.abs(amount), t.currency || currentCurrency)}
                            </div>
                            <div style="display: flex; gap: 8px; margin-left: 12px;">
                                <button class="btn btn-sm btn-outline" onclick="editTransaction(${t.id})" aria-label="Szerkesztés">✏️</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteTransaction(${t.id})" aria-label="Törlés">🗑️</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading transactions:', error);
            }
        }

        function showTransactionForm(transaction = null) {
            const form = document.getElementById('transaction-form');
            if (!form) return;
            
            form.style.display = 'block';
            
            if (transaction) {
                document.getElementById('form-title').textContent = 'Tranzakció szerkesztése';
                document.getElementById('trans-id').value = transaction.id;
                document.getElementById('trans-type').value = transaction.amount < 0 ? 'expense' : 'income';
                document.getElementById('trans-amount').value = Math.abs(transaction.amount);
                document.getElementById('trans-date').value = transaction.date;
                document.getElementById('trans-note').value = transaction.note || '';
                document.getElementById('trans-category').value = transaction.categoryId;
            } else {
                document.getElementById('form-title').textContent = 'Új tranzakció';
                document.getElementById('trans-id').value = '';
                document.getElementById('trans-amount').value = '';
                document.getElementById('trans-note').value = '';
                document.getElementById('trans-date').value = new Date().toISOString().split('T')[0];
            }
            
            loadCategoryDropdown();
            form.scrollIntoView({ behavior: 'smooth' });
        }

        function hideTransactionForm() {
            const form = document.getElementById('transaction-form');
            if (form) form.style.display = 'none';
        }

        async function loadCategoryDropdown() {
            try {
                const categories = await db.categories.toArray();
                const select = document.getElementById('trans-category');
                if (!select) return;
                
                if (categories.length === 0) {
                    select.innerHTML = '<option value="">Nincsenek kategóriák</option>';
                    return;
                }
                
                select.innerHTML = categories.map(c => 
                    `<option value="${c.id}">${c.icon} ${c.name}</option>`
                ).join('');
            } catch (error) {
                console.error('Error loading category dropdown:', error);
            }
        }

        async function saveTransaction(event) {
            event.preventDefault();
            
            try {
                const id = document.getElementById('trans-id').value;
                const type = document.getElementById('trans-type').value;
                let amount = parseFloat(document.getElementById('trans-amount').value);
                const categoryId = parseInt(document.getElementById('trans-category').value);
                const date = document.getElementById('trans-date').value;
                const note = document.getElementById('trans-note').value;
                
                if (!amount || !categoryId || !date) {
                    showToast('Kérlek tölts ki minden kötelező mezőt');
                    return;
                }
                
                if (type === 'expense') amount = -Math.abs(amount);
                else amount = Math.abs(amount);
                
                const transaction = {
                    amount,
                    categoryId,
                    date,
                    note: note || '',
                    source: 'manual',
                    currency: currentCurrency
                };
                
                if (id) {
                    transaction.id = parseInt(id);
                    await db.transactions.put(transaction);
                } else {
                    // Ellenőrizzük a kategória limitet
                    if (amount < 0) {
                        const limitExceeded = await checkCategoryLimit(categoryId, Math.abs(amount));
                        if (limitExceeded) {
                            pendingTransaction = transaction;
                            showLimitModal(categoryId, Math.abs(amount));
                            return;
                        }
                    }
                    await db.transactions.add(transaction);
                }
                
                hideTransactionForm();
                await loadTransactions();
                await loadDashboard();
                showToast('Tranzakció mentve');
            } catch (error) {
                console.error('Error saving transaction:', error);
                showToast('Hiba a tranzakció mentésekor: ' + error.message);
            }
        }

        async function editTransaction(id) {
            try {
                const transaction = await db.transactions.get(id);
                if (transaction) {
                    showTransactionForm(transaction);
                }
            } catch (error) {
                console.error('Error editing transaction:', error);
            }
        }

        async function deleteTransaction(id) {
            if (confirm('Biztosan törlöd ezt a tranzakciót?')) {
                try {
                    await db.transactions.delete(id);
                    await loadTransactions();
                    await loadDashboard();
                    showToast('Tranzakció törölve');
                } catch (error) {
                    console.error('Error deleting transaction:', error);
                    showToast('Hiba a törléskor');
                }
            }
        }

        // Kategória kezelés - JAVÍTVA
        async function loadCategories() {
            try {
                console.log('Loading categories...');
                const categories = await db.categories.toArray();
                console.log('Categories loaded:', categories);
                
                const list = document.getElementById('category-list');
                if (!list) return;
                
                if (categories.length === 0) {
                    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📁</div><p>Még nincsenek kategóriák. Az alapértelmezett kategóriák betöltése folyamatban...</p></div>';
                    // Próbáljuk meg betölteni az alapértelmezett kategóriákat
                    await initializeDefaultCategories();
                    // Újratöltés
                    setTimeout(() => loadCategories(), 500);
                    return;
                }
                
                const now = new Date();
                const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                
                const transactions = await db.transactions
                    .where('date')
                    .startsWith(currentMonth)
                    .toArray();
                
                const categorySpending = {};
                transactions.forEach(t => {
                    if (t.amount < 0) {
                        categorySpending[t.categoryId] = (categorySpending[t.categoryId] || 0) + Math.abs(t.amount);
                    }
                });
                
                list.innerHTML = categories.map(c => {
                    const spent = categorySpending[c.id] || 0;
                    const limit = c.monthlyLimit || 0;
                    const percentage = limit > 0 ? Math.min((spent / limit) * 100, 100) : 0;
                    const isOverLimit = limit > 0 && spent > limit;
                    
                    return `
                        <div class="transaction-item">
                            <div class="transaction-info">
                                <span class="category-badge" style="border-left: 4px solid ${c.color}">
                                    ${c.icon} ${c.name}
                                    ${isOverLimit ? '<span class="badge badge-danger">Túllépve</span>' : ''}
                                </span>
                                ${limit > 0 ? `
                                    <div style="font-size: 14px; margin-top: 8px;">
                                        ${formatCurrency(spent)} / ${formatCurrency(limit)}
                                    </div>
                                    <div class="progress-bar">
                                        <div class="progress-fill ${isOverLimit ? 'danger' : ''}" style="width: ${percentage}%; background: ${c.color}"></div>
                                    </div>
                                ` : ''}
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn btn-sm btn-outline" onclick="editCategory(${c.id})" aria-label="Szerkesztés">✏️</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteCategory(${c.id})" aria-label="Törlés">🗑️</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading categories:', error);
                const list = document.getElementById('category-list');
                if (list) {
                    list.innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><p>Hiba a kategóriák betöltésekor: ${error.message}</p></div>`;
                }
            }
        }

        function showCategoryForm(category = null) {
            const form = document.getElementById('category-form');
            if (!form) return;
            
            form.style.display = 'block';
            
            if (category) {
                document.getElementById('category-form-title').textContent = 'Kategória szerkesztése';
                document.getElementById('cat-id').value = category.id;
                document.getElementById('cat-name').value = category.name;
                document.getElementById('cat-icon').value = category.icon;
                document.getElementById('cat-color').value = category.color;
                document.getElementById('cat-limit').value = category.monthlyLimit || '';
            } else {
                document.getElementById('category-form-title').textContent = 'Új kategória';
                document.getElementById('cat-id').value = '';
                document.getElementById('cat-name').value = '';
                document.getElementById('cat-icon').value = '📁';
                document.getElementById('cat-color').value = '#4A90D9';
                document.getElementById('cat-limit').value = '';
            }
        }

        function hideCategoryForm() {
            const form = document.getElementById('category-form');
            if (form) form.style.display = 'none';
        }

        async function saveCategory(event) {
            event.preventDefault();
            
            try {
                console.log('Saving category...');
                
                const id = document.getElementById('cat-id').value;
                const name = document.getElementById('cat-name').value;
                const icon = document.getElementById('cat-icon').value;
                const color = document.getElementById('cat-color').value;
                const limitValue = document.getElementById('cat-limit').value;
                
                if (!name || !icon || !color) {
                    showToast('Kérlek tölts ki minden kötelező mezőt');
                    return;
                }
                
                const category = {
                    name: name,
                    icon: icon,
                    color: color,
                    monthlyLimit: limitValue ? parseFloat(limitValue) : null
                };
                
                console.log('Category data:', category);
                
                let result;
                if (id) {
                    category.id = parseInt(id);
                    result = await db.categories.put(category);
                    console.log('Category updated:', result);
                } else {
                    result = await db.categories.add(category);
                    console.log('Category added:', result);
                }
                
                hideCategoryForm();
                await loadCategories();
                showToast('Kategória mentve');
            } catch (error) {
                console.error('Error saving category:', error);
                showToast('Hiba a kategória mentésekor: ' + error.message);
            }
        }

        async function editCategory(id) {
            try {
                const category = await db.categories.get(id);
                if (category) {
                    showCategoryForm(category);
                }
            } catch (error) {
                console.error('Error editing category:', error);
            }
        }

        async function deleteCategory(id) {
            if (confirm('Biztosan törlöd ezt a kategóriát? A hozzá tartozó tranzakciók megmaradnak.')) {
                try {
                    await db.categories.delete(id);
                    await loadCategories();
                    showToast('Kategória törölve');
                } catch (error) {
                    console.error('Error deleting category:', error);
                    showToast('Hiba a törléskor');
                }
            }
        }

        // Limit túllépés kezelése
        async function checkCategoryLimit(categoryId, amount) {
            try {
                const category = await db.categories.get(categoryId);
                if (!category || !category.monthlyLimit) return false;
                
                const now = new Date();
                const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                
                const transactions = await db.transactions
                    .where('date')
                    .startsWith(currentMonth)
                    .toArray();
                
                const currentSpending = transactions
                    .filter(t => t.categoryId === categoryId && t.amount < 0)
                    .reduce((sum, t) => sum + Math.abs(t.amount), 0);
                
                return (currentSpending + amount) > category.monthlyLimit;
            } catch (error) {
                console.error('Error checking limit:', error);
                return false;
            }
        }

        function showLimitModal(categoryId, amount) {
            const modal = document.getElementById('limit-modal');
            if (!modal) return;
            
            document.getElementById('limit-message').textContent = 
                `Ez a tranzakció (${formatCurrency(amount)}) túllépné a kategória havi limitjét.`;
            
            loadCategoriesForTransfer();
            modal.style.display = 'flex';
        }

        async function loadCategoriesForTransfer() {
            try {
                const categories = await db.categories.toArray();
                const now = new Date();
                const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                
                const transactions = await db.transactions
                    .where('date')
                    .startsWith(currentMonth)
                    .toArray();
                
                const select = document.getElementById('limit-transfer-category');
                if (!select) return;
                
                const options = categories
                    .filter(c => c.monthlyLimit)
                    .map(c => {
                        const spent = transactions
                            .filter(t => t.categoryId === c.id && t.amount < 0)
                            .reduce((sum, t) => sum + Math.abs(t.amount), 0);
                        const remaining = c.monthlyLimit - spent;
                        return { ...c, remaining };
                    })
                    .filter(c => c.remaining > 0);
                
                select.innerHTML = options
                    .map(c => `<option value="${c.id}">${c.icon} ${c.name} (Maradék: ${formatCurrency(c.remaining)})</option>`)
                    .join('');
                
                const status = document.getElementById('limit-transfer-status');
                if (status) {
                    status.textContent = options.length === 0 ? 
                        'Nincs elég maradék más kategóriákban. A tranzakció mentése nem lehetséges.' : '';
                }
            } catch (error) {
                console.error('Error loading categories for transfer:', error);
            }
        }

        async function transferLimit() {
            try {
                const categoryId = parseInt(document.getElementById('limit-transfer-category').value);
                if (!categoryId || !pendingTransaction) return;
                
                await db.transactions.add(pendingTransaction);
                pendingTransaction = null;
                closeLimitModal();
                hideTransactionForm();
                await loadTransactions();
                await loadDashboard();
                showToast('Tranzakció mentve limitátvezetéssel');
            } catch (error) {
                console.error('Error transferring limit:', error);
                showToast('Hiba az átvezetéskor');
            }
        }

        function closeLimitModal() {
            const modal = document.getElementById('limit-modal');
            if (modal) modal.style.display = 'none';
            pendingTransaction = null;
        }

        // Megtakarítási célok
        async function loadSavingsGoals() {
            try {
                const goals = await db.savingsGoals.toArray();
                const container = document.getElementById('savings-goal');
                if (!container) return;
                
                if (goals.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-icon">🎯</div><p>Még nincs megtakarítási cél</p></div>';
                    return;
                }
                
                container.innerHTML = goals.map(g => {
                    const percentage = g.targetAmount > 0 ? Math.min((g.currentAmount / g.targetAmount) * 100, 100) : 0;
                    const deadline = g.deadline ? new Date(g.deadline).toLocaleDateString('hu-HU') : 'Nincs';
                    
                    return `
                        <div style="margin-bottom: 24px;">
                            <h3>${g.name}</h3>
                            <div class="progress-bar" style="height: 20px; border-radius: 10px;">
                                <div class="progress-fill" style="width: ${percentage}%; background: var(--color-success);"></div>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-top: 8px;">
                                <span>${formatCurrency(g.currentAmount)}</span>
                                <span>${formatCurrency(g.targetAmount)}</span>
                            </div>
                            <div style="font-size: 14px; color: var(--color-text-secondary); margin-top: 8px;">
                                Határidő: ${deadline}
                            </div>
                            <div class="grid-2" style="margin-top: 16px;">
                                <button class="btn btn-sm btn-success" onclick="addToSavings(${g.id})">💰 Hozzáadás</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteSavingsGoal(${g.id})">🗑️ Törlés</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading savings goals:', error);
            }
        }

        function showSavingsForm() {
            const form = document.getElementById('savings-form');
            if (form) form.style.display = 'block';
        }

        function hideSavingsForm() {
            const form = document.getElementById('savings-form');
            if (form) form.style.display = 'none';
        }

        async function saveSavingsGoal(event) {
            event.preventDefault();
            
            try {
                const goal = {
                    name: document.getElementById('savings-name').value,
                    targetAmount: parseFloat(document.getElementById('savings-target').value),
                    currentAmount: parseFloat(document.getElementById('savings-current').value) || 0,
                    deadline: document.getElementById('savings-deadline').value || null,
                    linkedCategoryIds: []
                };
                
                await db.savingsGoals.add(goal);
                hideSavingsForm();
                document.getElementById('savings-form').querySelector('form').reset();
                await loadSavingsGoals();
                showToast('Cél mentve');
            } catch (error) {
                console.error('Error saving savings goal:', error);
                showToast('Hiba a cél mentésekor');
            }
        }

        async function addToSavings(goalId) {
            const amount = prompt('Mennyit szeretnél hozzáadni?');
            if (!amount || isNaN(amount)) return;
            
            try {
                const numAmount = parseFloat(amount);
                const goal = await db.savingsGoals.get(goalId);
                
                if (goal) {
                    await db.savingsGoals.update(goalId, { 
                        currentAmount: goal.currentAmount + numAmount 
                    });
                    
                    // Megtakarítás kategória keresése vagy létrehozása
                    let savingsCat = await db.categories.where('name').equals('Megtakarítás').first();
                    if (!savingsCat) {
                        savingsCat = { name: 'Megtakarítás', icon: '💰', monthlyLimit: null, color: '#27AE60' };
                        savingsCat.id = await db.categories.add(savingsCat);
                    }
                    
                    await db.transactions.add({
                        amount: -numAmount,
                        categoryId: savingsCat.id,
                        date: new Date().toISOString().split('T')[0],
                        note: `Megtakarítás: ${goal.name}`,
                        source: 'manual',
                        currency: currentCurrency
                    });
                    
                    await loadSavingsGoals();
                    await loadDashboard();
                    showToast('Megtakarítás frissítve');
                }
            } catch (error) {
                console.error('Error adding to savings:', error);
                showToast('Hiba a megtakarítás frissítésekor');
            }
        }

        async function deleteSavingsGoal(id) {
            if (confirm('Biztosan törlöd ezt a célt?')) {
                try {
                    await db.savingsGoals.delete(id);
                    await loadSavingsGoals();
                    showToast('Cél törölve');
                } catch (error) {
                    console.error('Error deleting savings goal:', error);
                    showToast('Hiba a törléskor');
                }
            }
        }

        // Dashboard
        async function loadDashboard() {
            try {
                const now = new Date();
                const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
                const daysElapsed = now.getDate();
                
                const transactions = await db.transactions.toArray();
                const monthlyTransactions = transactions.filter(t => t.date.startsWith(currentMonth));
                
                const income = monthlyTransactions
                    .filter(t => t.amount > 0)
                    .reduce((sum, t) => sum + t.amount, 0);
                
                const expenses = monthlyTransactions
                    .filter(t => t.amount < 0)
                    .reduce((sum, t) => sum + Math.abs(t.amount), 0);
                
                const balance = income - expenses;
                
                const balanceElement = document.getElementById('balance');
                if (balanceElement) {
                    balanceElement.textContent = (balance >= 0 ? '+' : '') + formatCurrency(balance);
                }
                
                // Kategóriák a diagramhoz
                const categories = await db.categories.toArray();
                const categoryExpenses = {};
                
                monthlyTransactions
                    .filter(t => t.amount < 0)
                    .forEach(t => {
                        categoryExpenses[t.categoryId] = (categoryExpenses[t.categoryId] || 0) + Math.abs(t.amount);
                    });
                
                const chartData = categories
                    .filter(c => categoryExpenses[c.id] > 0)
                    .map(c => ({
                        name: c.name,
                        amount: categoryExpenses[c.id],
                        color: c.color
                    }))
                    .sort((a, b) => b.amount - a.amount);
                
                updateChart(chartData);
                
                // Predikció
                const predictionDiv = document.getElementById('prediction-text');
                if (!predictionDiv) return;
                
                if (monthlyTransactions.filter(t => t.amount < 0).length < 3) {
                    predictionDiv.innerHTML = '📊 Még nincs elég adat a predikcióhoz.';
                } else {
                    const avgDailyExpense = expenses / daysElapsed;
                    const predictedTotal = avgDailyExpense * daysInMonth;
                    
                    // Előző hónap összehasonlítás
                    const prevMonth = now.getMonth() === 0 ? 12 : now.getMonth();
                    const prevYear = now.getMonth() === 0 ? now.getFullYear() - 1 : now.getFullYear();
                    const prevMonthStr = `${prevYear}-${String(prevMonth).padStart(2, '0')}`;
                    
                    const prevMonthExpenses = transactions
                        .filter(t => t.date.startsWith(prevMonthStr) && t.amount < 0)
                        .reduce((sum, t) => sum + Math.abs(t.amount), 0);
                    
                    let predictionHTML = `Ha így folytatod, hónap végéig kb. <strong>${formatCurrency(predictedTotal)}</strong>-t költesz.`;
                    
                    if (prevMonthExpenses > 0) {
                        const diff = predictedTotal - prevMonthExpenses;
                        const changeText = diff >= 0 ? 'több' : 'kevesebb';
                        predictionHTML += `<br>Ez ${formatCurrency(Math.abs(diff))}-tel ${changeText}, mint az előző hónapban (${formatCurrency(prevMonthExpenses)}).`;
                    }
                    
                    predictionDiv.innerHTML = predictionHTML;
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        function updateChart(data) {
            try {
                const canvas = document.getElementById('categoryChart');
                if (!canvas) return;
                
                const ctx = canvas.getContext('2d');
                
                if (chart) {
                    chart.destroy();
                }
                
                if (data.length === 0) {
                    return;
                }
                
                chart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: data.map(d => d.name),
                        datasets: [{
                            data: data.map(d => d.amount),
                            backgroundColor: data.map(d => d.color),
                            borderWidth: 2,
                            borderColor: '#fff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    padding: 20,
                                    usePointStyle: true
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Error updating chart:', error);
            }
        }

        // OCR funkcionalitás
        async function processOCR() {
            const fileInput = document.getElementById('ocr-file');
            const file = fileInput.files[0];
            if (!file) return;
            
            const status = document.getElementById('ocr-status');
            const result = document.getElementById('ocr-result');
            
            status.innerHTML = '⏳ OCR folyamatban... (Ez eltarthat néhány másodpercig)';
            result.innerHTML = '';
            
            try {
                const worker = await Tesseract.recognize(file, 'hun+eng', {
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            status.innerHTML = `⏳ Szöveg felismerése... ${Math.round(m.progress * 100)}%`;
                        }
                    }
                });
                
                const text = worker.data.text;
                
                // Összeg kinyerése
                let amount = null;
                const hufPattern = /(\d[\d\s]*)\s?(?:Ft|HUF)/i;
                const eurPattern = /€\s?(\d+[.,]\d{2})/;
                const usdPattern = /\$\s?(\d+[.,]\d{2})/;
                
                let match;
                if (currentCurrency === 'HUF') {
                    match = text.match(hufPattern);
                    if (match) amount = parseFloat(match[1].replace(/\s/g, ''));
                } else if (currentCurrency === 'EUR') {
                    match = text.match(eurPattern);
                    if (match) amount = parseFloat(match[1].replace(',', '.'));
                } else if (currentCurrency === 'USD') {
                    match = text.match(usdPattern);
                    if (match) amount = parseFloat(match[1].replace(',', '.'));
                }
                
                // Dátum kinyerése
                let date = null;
                const datePatterns = [
                    /(\d{4}[-./]\d{2}[-./]\d{2})/,
                    /(\d{2}[-./]\d{2}[-./]\d{4})/
                ];
                
                for (const pattern of datePatterns) {
                    const dateMatch = text.match(pattern);
                    if (dateMatch) {
                        date = dateMatch[1].replace(/\./g, '-');
                        break;
                    }
                }
                
                if (amount || date) {
                    let resultHTML = '<div style="margin-bottom: 16px;">';
                    resultHTML += '<strong>✅ Felismert adatok:</strong><br>';
                    if (amount) resultHTML += `Összeg: ${formatCurrency(amount)}<br>`;
                    if (date) resultHTML += `Dátum: ${date}<br>`;
                    resultHTML += '</div>';
                    resultHTML += '<button class="btn btn-primary" onclick="prefillOCRForm(' + 
                        (amount || 'null') + ', \'' + (date || '') + '\')">📝 Tranzakció létrehozása ezekkel az adatokkal</button>';
                    
                    result.innerHTML = resultHTML;
                    status.innerHTML = '✅ OCR kész';
                } else {
                    status.innerHTML = '❌ Nem sikerült automatikusan felismerni, kérlek töltsd ki manuálisan';
                    result.innerHTML = `
                        <div class="ocr-result">${text}</div>
                        <button class="btn btn-primary" onclick="navigateTo('transactions'); showTransactionForm();" style="margin-top: 16px;">
                            📝 Manuális rögzítés
                        </button>
                    `;
                }
            } catch (error) {
                status.innerHTML = '❌ Hiba az OCR feldolgozás során: ' + error.message;
                console.error('OCR Error:', error);
            }
        }

        function prefillOCRForm(amount, date) {
            navigateTo('transactions');
            setTimeout(() => {
                showTransactionForm();
                if (amount) {
                    document.getElementById('trans-amount').value = amount;
                    document.getElementById('trans-type').value = 'expense';
                }
                if (date) {
                    document.getElementById('trans-date').value = date;
                }
                document.getElementById('trans-note').value = 'OCR-ból beolvasva';
            }, 300);
        }

        // Alapértelmezett kategóriák inicializálása
        async function initializeDefaultCategories() {
            try {
                const count = await db.categories.count();
                console.log('Current category count:', count);
                
                if (count === 0) {
                    console.log('Adding default categories...');
                    await db.categories.bulkAdd(defaultCategories);
                    console.log('Default categories added successfully');
                }
            } catch (error) {
                console.error('Error initializing default categories:', error);
            }
        }

        // Inicializálás
        async function init() {
            try {
                console.log('Starting initialization...');
                
                // Service worker regisztrálása
                if ('serviceWorker' in navigator) {
                    try {
                        const registration = await navigator.serviceWorker.register('/service-worker.js');
                        console.log('Service Worker registered:', registration);
                    } catch (error) {
                        console.error('Service Worker registration failed:', error);
                    }
                }
                
                // Alapértelmezett kategóriák betöltése
                await initializeDefaultCategories();
                
                // Beállítások betöltése
                const currencySetting = await db.settings.get('currency');
                if (currencySetting) {
                    currentCurrency = currencySetting.value;
                } else {
                    await db.settings.put({ key: 'currency', value: 'HUF' });
                }
                
                const select = document.getElementById('currency-select');
                if (select) select.value = currentCurrency;
                
                // Kezdő oldal betöltése
                await loadDashboard();
                
                console.log('Initialization complete');
            } catch (error) {
                console.error('Initialization error:', error);
            }
        }

        // Alkalmazás indítása
        document.addEventListener('DOMContentLoaded', () => {
            init().catch(error => {
                console.error('Failed to initialize app:', error);
            });
        });
        
        // Azonnali inicializálás ha a DOM már betöltődött
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            init().catch(error => {
                console.error('Failed to initialize app:', error);
            });
        }
    </script>
